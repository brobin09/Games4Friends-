<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffd166">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Count with Me! 🎂</title>
<style>
  :root{
    --ink:#26221a;
    --sky:#ffe6a7;
    --sky2:#ffc971;
    --cream:#fff6e0;
    --pink:#ff8fab;
    --blue:#5ec5ff;
    --green:#7ddf64;
    --red:#ff5e5e;
    --purple:#c08cff;
    --orange:#ffa552;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{
    font-family:"Baloo 2","Comic Sans MS","Chalkboard SE","Trebuchet MS",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky) 0%, var(--sky2) 100%);
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
  }
  #app{position:fixed; inset:0; display:flex; flex-direction:column;}

  /* ---------- top bar ---------- */
  #topbar{
    display:flex; align-items:center; gap:8px;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
    flex:0 0 auto;
  }
  .tbtn{
    border:4px solid var(--ink); border-radius:18px; background:var(--cream);
    box-shadow:0 4px 0 var(--ink); font:inherit; font-weight:800;
    font-size:clamp(16px,3.4vw,22px); padding:8px 14px; cursor:pointer;
  }
  .tbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--ink);}
  .tbtn.on{background:var(--green);}
  #modewrap{display:flex; gap:6px; margin-left:auto;}
  #stickerbar{
    display:flex; align-items:center; gap:2px; font-size:clamp(18px,4vw,26px);
    max-width:34vw; overflow:hidden; white-space:nowrap;
  }

  /* ---------- screens ---------- */
  .screen{flex:1 1 auto; display:none; flex-direction:column; min-height:0;}
  .screen.show{display:flex;}

  #hometitle{
    text-align:center; font-size:clamp(30px,7vw,54px); font-weight:900;
    margin:0 0 2px; letter-spacing:-1px;
    text-shadow:0 3px 0 #fff, 0 6px 0 rgba(0,0,0,.12);
  }
  #homesub{text-align:center; font-size:clamp(14px,3vw,20px); margin:0 0 10px; opacity:.75;}
  #cards{
    flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px; padding:4px 14px calc(env(safe-area-inset-bottom) + 20px);
    align-content:start;
  }
  .card{
    border:5px solid var(--ink); border-radius:24px; background:var(--cream);
    box-shadow:0 7px 0 var(--ink); cursor:pointer;
    padding:14px 10px; text-align:center; min-height:132px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  }
  .card:active{transform:translateY(4px); box-shadow:0 3px 0 var(--ink);}
  .card .em{font-size:clamp(38px,8vw,52px); line-height:1;}
  .card .nm{font-weight:900; font-size:clamp(16px,3.4vw,21px);}
  .card .sk{font-size:clamp(11px,2.4vw,14px); opacity:.65;}

  /* ---------- play screen ---------- */
  #prompt{
    flex:0 0 auto; text-align:center; font-weight:900;
    font-size:clamp(20px,4.6vw,32px); padding:2px 16px 6px; min-height:1.4em;
  }
  #stage{
    flex:1 1 auto; position:relative; min-height:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:6px 10px;
  }
  #controls{
    flex:0 0 auto; display:flex; gap:12px; justify-content:center;
    padding:8px 12px calc(env(safe-area-inset-bottom) + 12px); flex-wrap:wrap;
  }
  .bigbtn{
    border:5px solid var(--ink); border-radius:28px; box-shadow:0 6px 0 var(--ink);
    background:var(--pink); font:inherit; font-weight:900; color:var(--ink);
    font-size:clamp(22px,5vw,34px); padding:14px 30px; cursor:pointer;
  }
  .bigbtn:active{transform:translateY(4px); box-shadow:0 2px 0 var(--ink);}
  .bigbtn.blow{background:var(--blue);}
  .bigbtn.next{background:var(--green);}
  .bigbtn.hidden{display:none;}

  /* ---------- cake ---------- */
  .cake{position:relative; display:flex; flex-direction:column; align-items:center;}
  .candles{
    display:flex; align-items:flex-end; justify-content:center; gap:12px;
    min-height:112px; padding-bottom:2px;
  }
  .candle{
    position:relative; width:24px; height:74px; border:4px solid var(--ink);
    border-radius:7px; cursor:pointer; flex:0 0 auto;
    background:repeating-linear-gradient(-45deg,#fff 0 8px,var(--red) 8px 16px);
    transition:transform .12s ease;
  }
  .candle.c2{background:repeating-linear-gradient(-45deg,#fff 0 8px,var(--blue) 8px 16px);}
  .candle.c3{background:repeating-linear-gradient(-45deg,#fff 0 8px,var(--green) 8px 16px);}
  .candle.c4{background:repeating-linear-gradient(-45deg,#fff 0 8px,var(--purple) 8px 16px);}
  .candle.c5{background:repeating-linear-gradient(-45deg,#fff 0 8px,var(--orange) 8px 16px);}
  .candle .wick{position:absolute; left:50%; top:-9px; width:4px; height:10px;
    margin-left:-2px; background:var(--ink); border-radius:2px;}
  .candle .flame{
    position:absolute; left:50%; top:-36px; margin-left:-13px;
    width:26px; height:34px; border-radius:50% 50% 45% 45% / 62% 62% 38% 38%;
    background:radial-gradient(ellipse at 50% 75%, #fff 0%, #ffe066 32%, #ffa41b 62%, #ff5e5e 100%);
    box-shadow:0 0 22px 6px rgba(255,180,60,.65);
    animation:flick .28s infinite alternate ease-in-out;
    transform-origin:50% 100%;
  }
  @keyframes flick{
    from{transform:scale(1,1) rotate(-3deg);} to{transform:scale(1.12,.92) rotate(3deg);}
  }
  .candle.out .flame{display:none;}
  .candle.out .wick{background:#6b6357;}
  .candle.counted{transform:translateY(-10px);}
  .candle .tag{
    position:absolute; left:50%; top:-72px; transform:translateX(-50%) scale(0);
    background:var(--cream); border:4px solid var(--ink); border-radius:50%;
    width:44px; height:44px; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:24px; box-shadow:0 3px 0 var(--ink);
    transition:transform .2s cubic-bezier(.3,1.6,.5,1);
  }
  .candle.counted .tag{transform:translateX(-50%) scale(1);}
  .smoke{
    position:absolute; left:50%; top:-24px; margin-left:-6px; width:12px; height:12px;
    border-radius:50%; background:rgba(120,120,120,.5); pointer-events:none;
    animation:puff 1.1s ease-out forwards;
  }
  @keyframes puff{
    from{transform:translate(0,0) scale(.5); opacity:.8;}
    to{transform:translate(-14px,-70px) scale(2.4); opacity:0;}
  }
  .cakebody{
    width:min(78vw,340px); height:96px; border:5px solid var(--ink); border-radius:12px;
    background:repeating-linear-gradient(90deg,#f7c9a3 0 26px,#e8b088 26px 52px);
    position:relative; box-shadow:0 7px 0 rgba(0,0,0,.18);
  }
  .frosting{
    position:absolute; left:-2px; right:-2px; top:-14px; height:34px;
    background:var(--pink); border:5px solid var(--ink); border-radius:16px;
  }
  .frosting::after{
    content:""; position:absolute; left:8px; right:8px; bottom:-14px; height:20px;
    background:var(--pink); border:5px solid var(--ink); border-top:none;
    border-radius:0 0 18px 18px;
  }
  .plate{
    width:min(88vw,400px); height:16px; border:5px solid var(--ink);
    border-radius:0 0 20px 20px; background:var(--cream); margin-top:-2px;
  }

  /* ---------- fan ---------- */
  .fanwrap{position:relative; width:200px; height:200px; flex:0 0 auto;}
  .fanwrap.spin .blades{animation:spin .55s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .blades{position:absolute; inset:0;}
  .socket, .blade{
    position:absolute; left:50%; top:50%; width:86px; height:26px;
    margin:-13px 0 0 0; transform-origin:0% 50%; border-radius:0 14px 14px 0;
  }
  .socket{border:4px dashed rgba(38,34,26,.35); background:rgba(255,255,255,.25);}
  .blade{border:4px solid var(--ink); box-shadow:0 3px 0 rgba(0,0,0,.15);}
  .hub{
    position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px;
    border:5px solid var(--ink); border-radius:50%; background:var(--cream); z-index:2;
    display:flex; align-items:center; justify-content:center; font-weight:900; font-size:26px;
  }
  .tray{
    display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
    padding:10px 12px; border:5px dashed rgba(38,34,26,.4); border-radius:22px;
    background:rgba(255,255,255,.35); min-height:66px; align-items:center;
  }
  .traypiece{
    width:76px; height:30px; border:4px solid var(--ink); border-radius:0 14px 14px 0;
    box-shadow:0 4px 0 var(--ink); cursor:pointer;
  }
  .traypiece:active{transform:translateY(3px); box-shadow:0 1px 0 var(--ink);}
  .traypiece.gone{visibility:hidden;}

  /* shape blades */
  .shapehole{
    width:74px; height:74px; border:5px dashed var(--ink); background:rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center;
  }
  .sq{border-radius:8px;} .ci{border-radius:50%;}
  .tr{width:0;height:0;border-left:37px solid transparent;border-right:37px solid transparent;
      border-bottom:64px solid var(--ink); background:none; border-top:none;}
  .opt{
    width:84px; height:84px; border:5px solid var(--ink); box-shadow:0 6px 0 var(--ink);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .opt:active{transform:translateY(4px); box-shadow:0 2px 0 var(--ink);}
  .row{display:flex; gap:14px; justify-content:center; align-items:center; flex-wrap:wrap;}

  /* pattern */
  .pchip{
    width:58px; height:58px; border:5px solid var(--ink); border-radius:14px;
    box-shadow:0 5px 0 var(--ink);
  }
  .pchip.q{background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:900;}

  /* leaves */
  .leaf{
    position:absolute; width:52px; height:52px; font-size:44px; line-height:52px;
    text-align:center; cursor:pointer; will-change:transform;
  }
  .leaf.caught{animation:pop .35s ease-out forwards; pointer-events:none;}
  @keyframes pop{to{transform:scale(2.2); opacity:0;}}

  /* counter chip */
  #counter{
    position:absolute; top:6px; left:50%; transform:translateX(-50%);
    background:var(--cream); border:5px solid var(--ink); border-radius:20px;
    padding:4px 18px; font-weight:900; font-size:clamp(22px,5vw,32px);
    box-shadow:0 5px 0 var(--ink); display:none; z-index:5;
  }
  #counter.show{display:block;}

  /* big numeral pop */
  #bignum{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:min(48vw,300px); font-weight:900; color:#fff; pointer-events:none;
    text-shadow:0 0 0 var(--ink), 8px 8px 0 rgba(38,34,26,.9);
    -webkit-text-stroke:10px var(--ink);
    opacity:0; z-index:20;
  }
  #bignum.go{animation:bn .85s ease-out;}
  @keyframes bn{
    0%{opacity:0; transform:scale(.3);}
    25%{opacity:1; transform:scale(1.1);}
    70%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.3);}
  }
  .conf{position:fixed; width:14px; height:20px; z-index:15; pointer-events:none; border-radius:3px;}
  /* ---------- grown-up studio ---------- */
  #studio{
    position:fixed; inset:0; z-index:40; background:var(--cream);
    display:none; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 14px);
  }
  #studio.show{display:flex;}
  #studio h2{margin:0 0 2px; font-size:clamp(22px,5vw,30px);}
  #studio .lede{margin:0 0 10px; font-size:14px; opacity:.7; line-height:1.35;}
  #studio .lede b{opacity:1;}
  #voicepick{
    display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap;
  }
  #voicesel{
    flex:1 1 180px; font:inherit; font-size:16px; padding:8px 10px;
    border:4px solid var(--ink); border-radius:14px; background:#fff;
  }
  #cliplist{
    flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    border-top:4px solid rgba(38,34,26,.15); padding-top:8px;
  }
  .cliprow{
    display:flex; align-items:center; gap:8px; padding:7px 0;
    border-bottom:2px solid rgba(38,34,26,.1);
  }
  .cliprow .lbl{flex:1 1 auto; font-size:16px; font-weight:700; min-width:0;}
  .cliprow .lbl small{display:block; font-weight:400; opacity:.6; font-size:13px;}
  .cliprow .dot{
    width:14px; height:14px; border-radius:50%; border:3px solid var(--ink);
    background:#fff; flex:0 0 auto;
  }
  .cliprow.has .dot{background:var(--green);}
  .cliprow.rec .dot{background:var(--red); animation:pulse .6s infinite alternate;}
  @keyframes pulse{from{transform:scale(1);} to{transform:scale(1.4);}}
  .minibtn{
    border:3px solid var(--ink); border-radius:12px; background:#fff; font:inherit;
    font-size:15px; font-weight:800; padding:6px 10px; box-shadow:0 3px 0 var(--ink);
    cursor:pointer; flex:0 0 auto;
  }
  .minibtn:active{transform:translateY(2px); box-shadow:0 1px 0 var(--ink);}
  .minibtn.rec{background:var(--red); color:#fff;}
  .minibtn.stop{background:var(--ink); color:#fff;}
  #studiofoot{display:flex; gap:8px; padding-top:10px; flex-wrap:wrap;}
  #gate{
    position:fixed; inset:0; z-index:50; background:rgba(38,34,26,.75);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #gate.show{display:flex;}
  #gatebox{
    background:var(--cream); border:5px solid var(--ink); border-radius:24px;
    box-shadow:0 8px 0 rgba(0,0,0,.3); padding:22px; max-width:340px; text-align:center;
  }
  #gatebox h3{margin:0 0 6px;}
  #gatebox p{margin:0 0 14px; font-size:15px; opacity:.75;}
  #gategrid{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .gnum{
    width:60px; height:60px; border:4px solid var(--ink); border-radius:16px;
    background:#fff; box-shadow:0 4px 0 var(--ink); font:inherit; font-weight:900;
    font-size:26px; cursor:pointer;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button class="tbtn" id="homebtn">🏠</button>
    <div id="stickerbar"></div>
    <div id="modewrap">
      <button class="tbtn" id="studiobtn" title="Record your voice">🎙️</button>
      <button class="tbtn" id="micbtn" title="Blow with your breath">🎤</button>
      <button class="tbtn" id="littlebtn">Little</button>
      <button class="tbtn on" id="bigbtn">Big</button>
    </div>
  </div>

  <div class="screen show" id="home">
    <h1 id="hometitle">Count with Me!</h1>
    <p id="homesub">Tap a game to play</p>
    <div id="cards"></div>
  </div>

  <div class="screen" id="play">
    <div id="prompt"></div>
    <div id="stage"><div id="counter"></div></div>
    <div id="controls"></div>
  </div>
</div>
<div id="bignum"></div>

<div id="gate">
  <div id="gatebox">
    <h3>Grown-ups only</h3>
    <p id="gateq">Tap the number 7.</p>
    <div id="gategrid"></div>
  </div>
</div>

<div id="studio">
  <h2>🎙️ Record your voice</h2>
  <p class="lede">
    Tap <b>Rec</b>, say the line, tap <b>Stop</b>. The game plays your recording instead of the robot voice.
    Record just the numbers if you only do a few &mdash; those are said the most.
  </p>
  <div id="voicepick">
    <label for="voicesel" style="font-size:15px;font-weight:800;">Fallback voice</label>
    <select id="voicesel"></select>
    <button class="minibtn" id="voicetest">Test</button>
  </div>
  <div id="cliplist"></div>
  <div id="studiofoot">
    <button class="minibtn" id="studioclose">← Back to games</button>
    <button class="minibtn" id="clipwipe">Erase all recordings</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ============ basics ============ */
var $ = function(s){ return document.querySelector(s); };
var stage = $("#stage"), promptEl = $("#prompt"), controls = $("#controls"),
    counter = $("#counter"), bignum = $("#bignum"), cards = $("#cards");

function bindTap(el, fn){
  var lock = false;
  el.addEventListener("touchend", function(e){
    e.preventDefault();
    lock = true; setTimeout(function(){ lock = false; }, 500);
    fn(e);
  }, {passive:false});
  el.addEventListener("click", function(e){ if(lock) return; fn(e); });
}
document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
document.addEventListener("touchmove", function(e){
  if(e.target.closest && e.target.closest("#cards")) return;
  if(e.touches.length > 1) e.preventDefault();
}, {passive:false});

/* ============ audio ============ */
var AC = null;
function ac(){
  if(!AC){ var C = window.AudioContext || window.webkitAudioContext; if(C) AC = new C(); }
  if(AC && AC.state === "suspended") AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, delay){
  var c = ac(); if(!c) return;
  var t = c.currentTime + (delay || 0);
  var o = c.createOscillator(), g = c.createGain();
  o.type = type || "sine"; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.18, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.25));
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + (dur || 0.25) + 0.05);
}
function blip(n){ tone(320 + n * 60, 0.18, "triangle", 0.2, 0); }
function sparkle(){ [660,880,1180].forEach(function(f,i){ tone(f,0.18,"sine",0.15,i*0.07); }); }
function cheer(){ [523,659,784,1046].forEach(function(f,i){ tone(f,0.35,"triangle",0.18,i*0.09); }); }
function nudge(){ tone(300,0.16,"sine",0.12,0); tone(360,0.16,"sine",0.12,0.12); }
function whoosh(){
  var c = ac(); if(!c) return;
  var len = Math.floor(c.sampleRate * 0.7);
  var buf = c.createBuffer(1, len, c.sampleRate), d = buf.getChannelData(0);
  for(var i=0;i<len;i++){ d[i] = (Math.random()*2-1) * (1 - i/len); }
  var s = c.createBufferSource(); s.buffer = buf;
  var f = c.createBiquadFilter(); f.type = "bandpass";
  f.frequency.setValueAtTime(600, c.currentTime);
  f.frequency.exponentialRampToValueAtTime(2600, c.currentTime + 0.5);
  var g = c.createGain(); g.gain.setValueAtTime(0.35, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.7);
  s.connect(f); f.connect(g); g.connect(c.destination); s.start();
}

/* ============ speech ============ */
var WORDS = ["zero","one","two","three","four","five","six","seven","eight","nine","ten"];
function word(n){ return WORDS[n] || String(n); }

/* -- 1. voice selection: hunt down the least robotic voice on the device -- */
var VOICES = [], VOICE = null;
var PREFERRED = ["Samantha","Karen","Moira","Tessa","Nicky","Aaron","Allison","Ava","Susan","Fiona","Serena","Google US English","Microsoft Zira"];
function scoreVoice(v){
  var s = 0;
  if(/premium|enhanced|siri/i.test(v.name)) s += 60;     // downloaded high-quality voices
  if(/compact|eloquence|espeak/i.test(v.name)) s -= 40;  // the robot ones
  for(var i=0;i<PREFERRED.length;i++){
    if(v.name.indexOf(PREFERRED[i]) >= 0){ s += 30 - i; break; }
  }
  if(v.localService) s += 4;
  if(/^en-US/i.test(v.lang)) s += 3;
  return s;
}
function loadVoices(){
  try{ VOICES = (window.speechSynthesis && speechSynthesis.getVoices()) || []; }catch(e){ VOICES = []; }
  VOICES = VOICES.filter(function(v){ return /^en/i.test(v.lang); });
  var saved = null;
  try{ saved = localStorage.getItem("countwithme.voice"); }catch(e){}
  if(saved){
    var hit = VOICES.filter(function(v){ return v.name === saved; })[0];
    if(hit){ VOICE = hit; return; }
  }
  var ranked = VOICES.map(function(v){ return {v:v, s:scoreVoice(v)}; })
                     .sort(function(a,b){ return b.s - a.s; });
  VOICE = ranked.length ? ranked[0].v : null;
}
if(window.speechSynthesis){
  loadVoices();
  try{ speechSynthesis.onvoiceschanged = loadVoices; }catch(e){}
}
function setVoice(name){
  try{ localStorage.setItem("countwithme.voice", name); }catch(e){}
  loadVoices();
}

/* -- 2. recorded clips (a real human voice, recorded by the grown-up) -- */
var CLIPS = {};       // key -> object URL
var DB = null;
function db(){
  return new Promise(function(res, rej){
    if(DB) return res(DB);
    if(!window.indexedDB) return rej();
    var r = indexedDB.open("countwithme", 1);
    r.onupgradeneeded = function(){ r.result.createObjectStore("clips"); };
    r.onsuccess = function(){ DB = r.result; res(DB); };
    r.onerror = function(){ rej(); };
  });
}
function dbPut(k, blob){
  return db().then(function(d){
    return new Promise(function(res, rej){
      var t = d.transaction("clips", "readwrite");
      t.objectStore("clips").put(blob, k);
      t.oncomplete = res; t.onerror = rej;
    });
  });
}
function dbDel(k){
  return db().then(function(d){
    return new Promise(function(res, rej){
      var t = d.transaction("clips", "readwrite");
      t.objectStore("clips").delete(k);
      t.oncomplete = res; t.onerror = rej;
    });
  });
}
function dbAll(){
  return db().then(function(d){
    return new Promise(function(res, rej){
      var t = d.transaction("clips", "readonly");
      var s = t.objectStore("clips");
      var keys = s.getAllKeys(), vals = s.getAll();
      t.oncomplete = function(){
        var out = {};
        for(var i=0;i<keys.result.length;i++){ out[keys.result[i]] = vals.result[i]; }
        res(out);
      };
      t.onerror = rej;
    });
  });
}
function loadClips(){
  return dbAll().then(function(all){
    Object.keys(all).forEach(function(k){
      try{ CLIPS[k] = URL.createObjectURL(all[k]); }catch(e){}
    });
  }).catch(function(){});
}

var clipPlayer = null;
function playClip(key, cb){
  try{
    if(clipPlayer){ clipPlayer.pause(); }
    var a = new Audio(CLIPS[key]);
    clipPlayer = a;
    a.onended = function(){ if(cb) cb(); };
    a.onerror = function(){ if(cb) cb(); };
    var p = a.play();
    if(p && p.catch) p.catch(function(){ if(cb) cb(); });
    return true;
  }catch(e){ return false; }
}

/* -- 3. prosody: chunk the line, ride the pitch, let it breathe -- */
var numWord = {};
WORDS.forEach(function(w, i){ numWord[w] = i; });

function speakChunk(text, pitch, rate, cb){
  try{
    if(!window.speechSynthesis){ if(cb) setTimeout(cb, 420); return; }
    var u = new SpeechSynthesisUtterance(text);
    if(VOICE) u.voice = VOICE;
    u.rate = rate; u.pitch = pitch; u.volume = 1; u.lang = VOICE ? VOICE.lang : "en-US";
    var done = false;
    u.onend = function(){ if(!done){ done = true; if(cb) cb(); } };
    setTimeout(function(){ if(!done){ done = true; if(cb) cb(); } }, 400 + text.length * 90);
    speechSynthesis.speak(u);
  }catch(e){ if(cb) setTimeout(cb, 420); }
}

// A line is split on sentence breaks so the voice actually pauses and resets,
// instead of steamrolling one flat contour across the whole thing.
function say(text, cb, key){
  if(!VOICE) loadVoices();   // iOS hands over the voice list late, so keep checking
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  if(clipPlayer){ try{ clipPlayer.pause(); }catch(e){} }

  var t = String(text).trim();
  var k = key || null;

  // a bare number word ("three") gets the number clip and a rising, singsong pitch
  var bare = t.toLowerCase().replace(/[!.?,]/g, "");
  if(k === null && numWord.hasOwnProperty(bare)) k = "n" + numWord[bare];

  if(k && CLIPS[k]){ if(playClip(k, cb)) return; }

  var pitch = 1.3, rate = 0.9;
  if(numWord.hasOwnProperty(bare)){
    pitch = 1.15 + numWord[bare] * 0.075;   // counting climbs
    rate = 0.78;                            // and slows down, the way people count
  } else if(/[!]/.test(t)){
    pitch = 1.42; rate = 0.95;              // excitement lifts and quickens
  } else if(/\?/.test(t)){
    pitch = 1.24; rate = 0.86;              // questions sit lower and slower
  }

  var parts = (t.match(/[^.!?]+[.!?]*/g) || [t])
                .map(function(p){ return p.trim(); })
                .filter(function(p){ return p.length; });
  if(!parts.length) parts = [t];
  var i = 0;
  (function next(){
    if(i >= parts.length){ if(cb) cb(); return; }
    var p = parts[i++];
    var pi = pitch + (i - 1) * 0.05;        // each clause lifts a little
    speakChunk(p, Math.min(2, pi), rate, function(){
      if(i < parts.length) setTimeout(next, 170); else next();   // a real breath between clauses
    });
  })();
}

var micOn = false, micData = null, blowHandler = null, blowArmed = false, blowHot = 0;
function armBlow(fn){ blowHandler = fn; blowArmed = true; }
function disarmBlow(){ blowHandler = null; blowArmed = false; }
function fireBlow(){
  if(!blowArmed || !blowHandler) return;
  var f = blowHandler; blowArmed = false;
  f();
}
function micLoop(){
  if(!micOn || !micData) return;
  var an = micData.an, buf = micData.buf;
  an.getByteTimeDomainData(buf);
  var sum = 0;
  for(var i=0;i<buf.length;i++){ var v = (buf[i]-128)/128; sum += v*v; }
  var rms = Math.sqrt(sum / buf.length);
  if(rms > 0.14){ blowHot++; } else { blowHot = Math.max(0, blowHot - 1); }
  if(blowHot > 5){ blowHot = 0; fireBlow(); }
  requestAnimationFrame(micLoop);
}
bindTap($("#micbtn"), function(){
  ac();
  if(micOn){
    micOn = false; $("#micbtn").classList.remove("on");
    if(micData && micData.stream){ micData.stream.getTracks().forEach(function(t){ t.stop(); }); }
    micData = null;
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    promptEl.textContent = "Breath mode needs a microphone. Use the BLOW button!";
    return;
  }
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}})
    .then(function(stream){
      var c = ac(); if(!c) return;
      var src = c.createMediaStreamSource(stream);
      var an = c.createAnalyser(); an.fftSize = 512;
      src.connect(an);
      micData = {stream:stream, an:an, buf:new Uint8Array(an.fftSize)};
      micOn = true; $("#micbtn").classList.add("on");
      say("Now you can blow with your breath!");
      micLoop();
    })
    .catch(function(){
      promptEl.textContent = "No microphone. Use the BLOW button instead!";
    });
});

/* ============ GAME 1: Count the Candles ============ */
function gameCake(){
  clearStage();
  var target = mode === "little" ? 3 : rnd(2, 5);
  round();

  function round(){
    clearStage();
    var cake = makeCake(target);
    stage.appendChild(cake);
    var counted = 0;
    setCounter(0);

    cake.candles.forEach(function(c){
      bindTap(c, function(){
        ac();
        if(mode === "little"){
          counted = Math.min(target, counted + (c.classList.contains("counted") ? 0 : 1));
          c.classList.add("counted");
          c.querySelector(".tag").textContent = String(counted);
          setCounter(counted);
          blip(counted); popNum(counted); say(word(counted));
          return;
        }
        if(c.classList.contains("counted")) return;
        counted++;
        c.classList.add("counted");
        c.querySelector(".tag").textContent = String(counted);
        setCounter(counted);
        blip(counted); popNum(counted);
        if(counted === target){
          say(word(target), function(){ say("Now blow them out!", null, "blow"); });
          sparkle();
          showBlow();
        } else {
          say(word(counted));
        }
      });
    });

    if(mode === "little"){
      promptEl.textContent = "Tap the candles, then blow!";
      say("Tap the candles. Then blow them out!", null, "little_cake");
      showBlow();
    } else {
      promptEl.textContent = "How many candles? Tap each one.";
      say("How many candles? Tap each one.", null, "ask_count");
    }

    function showBlow(){
      controls.innerHTML = "";
      btn("BLOW! 🌬️", "blow", doBlow);
      armBlow(doBlow);
    }

    function doBlow(){
      disarmBlow();
      controls.innerHTML = "";
      whoosh();
      var lit = cake.candles.filter(function(c){ return !c.classList.contains("out"); });
      var left = lit.length;
      promptEl.textContent = "";
      step();
      function step(){
        if(left === 0){
          say("All out! Happy birthday!", null, "allout");
          cheer(); confetti(); award();
          promptEl.textContent = mode === "little" ? "Yay!" : "All out! 🎉";
          if(mode === "little"){
            setTimeout(function(){
              cake.candles.forEach(function(c){
                relight(c);
                c.classList.remove("counted");
                c.querySelector(".tag").textContent = "";
              });
              counted = 0; setCounter(0);
              promptEl.textContent = "Tap the candles, then blow!";
              showBlow();
            }, 1700);
          } else {
            btn("More! 🎂", "next", function(){
              target = target >= 5 ? rnd(2, 5) : target + 1;
              round();
            });
          }
          return;
        }
        var c = lit[lit.length - left];
        blowOut(c);
        left--;
        setCounter(left);
        tone(200 + left * 40, 0.2, "sine", 0.15, 0);
        say(word(left));
        setTimeout(step, 900);
      }
    }
  }
}

/* ============ GAME 2: Trick Candles ============ */
function gameTrick(){
  clearStage();
  var target = rnd(3, 5), tricks = 2;
  round(target, tricks);

  function round(n, tricksLeft){
    clearStage();
    var cake = makeCake(n);
    stage.appendChild(cake);
    promptEl.textContent = "Count the lit candles!";
    say("These are trick candles! Count them first.", null, "trick_intro");
    countPhase(cake.candles, function(){
      controls.innerHTML = "";
      btn("BLOW! 🌬️", "blow", blowAll);
      armBlow(blowAll);
    });

    function blowAll(){
      disarmBlow();
      controls.innerHTML = "";
      whoosh();
      cake.candles.forEach(function(c, i){
        setTimeout(function(){ blowOut(c); tone(240 - i * 20, 0.15, "sine", 0.12, 0); }, i * 130);
      });
      setTimeout(function(){
        if(tricksLeft <= 0){
          say("All out! Happy birthday!", null, "allout");
          cheer(); confetti(); award();
          promptEl.textContent = "All out! 🎉";
          btn("Again 🕯️", "next", function(){ gameTrick(); });
          return;
        }
        var k = tricksLeft === 2 ? Math.max(2, n - 2) : 1;
        var pick = cake.candles.slice(0, k);
        pick.forEach(function(c){
          relight(c);
          c.classList.remove("counted");
          c.querySelector(".tag").textContent = "";
        });
        sparkle();
        say("Uh oh! They came back! How many now?", null, "trick_back");
        promptEl.textContent = "Uh oh! Count them again!";
        setCounter(0);
        var lit = cake.candles.filter(function(c){ return !c.classList.contains("out"); });
        countPhase(lit, function(){
          controls.innerHTML = "";
          btn("BLOW! 🌬️", "blow", function(){
            disarmBlow(); controls.innerHTML = "";
            whoosh();
            lit.forEach(function(c, i){ setTimeout(function(){ blowOut(c); }, i * 130); });
            setTimeout(function(){
              tricksLeft--;
              if(tricksLeft <= 0){
                say("Yay! You did it!", null, "yay");
                cheer(); confetti(); award();
                promptEl.textContent = "You beat them! 🎉";
                btn("Again 🕯️", "next", function(){ gameTrick(); });
              } else {
                var c2 = cake.candles[0];
                relight(c2);
                c2.classList.remove("counted");
                c2.querySelector(".tag").textContent = "";
                sparkle();
                say("Uh oh! They came back! How many now?", null, "trick_back");
                promptEl.textContent = "One more! Count again!";
                setCounter(0);
                countPhase([c2], function(){
                  controls.innerHTML = "";
                  btn("BLOW! 🌬️", "blow", function(){
                    disarmBlow(); controls.innerHTML = "";
                    whoosh(); blowOut(c2);
                    setTimeout(function(){
                      say("All out! Happy birthday!", null, "allout");
                      cheer(); confetti(); award();
                      promptEl.textContent = "All out! 🎉";
                      btn("Again 🕯️", "next", function(){ gameTrick(); });
                    }, 700);
                  });
                  armBlow(function(){ blowOut(c2); whoosh(); cheer(); confetti(); award();
                    promptEl.textContent = "All out! 🎉"; controls.innerHTML = "";
                    btn("Again 🕯️", "next", function(){ gameTrick(); }); });
                });
              }
            }, lit.length * 140 + 500);
          });
        });
      }, n * 140 + 700);
    }
  }

  function countPhase(list, done){
    var counted = 0;
    setCounter(0);
    list.forEach(function(c){
      bindTap(c, function(){
        ac();
        if(c.classList.contains("counted") || c.classList.contains("out")) return;
        counted++;
        c.classList.add("counted");
        c.querySelector(".tag").textContent = String(counted);
        setCounter(counted);
        blip(counted); popNum(counted);
        if(counted === list.length){
          say(word(counted), function(){ say("Now blow them out!", null, "blow"); });
          sparkle();
          done();
        } else {
          say(word(counted));
        }
      });
    });
  }
}

    d.textContent = LEAVES[rnd(0, 2)];
    var x = 20 + Math.random() * (stage.clientWidth - 80);
    d.style.left = x + "px";
    d.style.top = "-60px";
    d.vy = 0.9 + Math.random() * 0.8;
    d.y = -60;
    d.ph = Math.random() * 6.28;
    d.x0 = x;
    stage.appendChild(d);
    bindTap(d, function(){
      ac();
      if(d.classList.contains("caught")) return;
      d.classList.add("caught");
      caught++;
      setCounter(caught);
      blip(caught); popNum(caught);
      setTimeout(function(){ d.remove(); }, 380);
      if(mode === "little"){ say(word(caught)); return; }
      if(caught === target){
        running = false;
        say(word(target), function(){ say("Yay! You did it!", null, "yay"); });
        cheer(); confetti(); award();
        promptEl.textContent = "You caught " + target + "! 🎉";
        controls.innerHTML = "";
        btn("Again 🍁", "next", function(){ gameLeaves(); });
      } else if(caught > target){
        running = false;
        nudge();
        say("That is " + word(caught) + ". We needed " + word(target) + ".", function(){ say("Try again!", null, "tryagain"); });
        promptEl.textContent = "That's " + caught + ", we needed " + target + ". Try again!";
        controls.innerHTML = "";
        btn("Try again 🍁", "next", function(){ gameLeaves(); });
      } else {
        say(word(caught));
      }
    });
    live.push(d);
  }

  function tick(t){
    if(running){
      if(t - lastSpawn > 850){ lastSpawn = t; spawn(); }
      for(var i=live.length-1;i>=0;i--){
        var d = live[i];
        if(!d.isConnected){ live.splice(i,1); continue; }
        if(d.classList.contains("caught")) continue;
        d.y += d.vy * 1.6;
        d.ph += 0.05;
        d.style.transform = "translate(" + Math.sin(d.ph) * 26 + "px," + d.y + "px) rotate(" + Math.sin(d.ph) * 25 + "deg)";
        if(d.y > stage.clientHeight + 40){ d.remove(); live.splice(i,1); }
      }
    }
    loops.push(requestAnimationFrame(tick));
  }
  loops.push(requestAnimationFrame(tick));
}

/* ============ GAME 6: Shape Blades ============ */
function gameShapes(){
  clearStage();
  var SHAPES = [
    {k:"ci", n:"circle"},
    {k:"sq", n:"square"},
    {k:"tr", n:"triangle"}
  ];
  var want = SHAPES[rnd(0, 2)];
  var hole = document.createElement("div");
  hole.className = "shapehole " + want.k;
  if(want.k === "tr"){ hole.className = "shapehole"; hole.innerHTML = '<div class="tr"></div>'; }
  var top = document.createElement("div");
  top.className = "row";
  top.appendChild(hole);
  stage.appendChild(top);

  promptEl.textContent = "Which blade fits the " + want.n + "?";
  say("Which blade fits the " + want.n + " hole?");

  var row = document.createElement("div");
  row.className = "row";
  var order = SHAPES.slice().sort(function(){ return Math.random() - 0.5; });
  order.forEach(function(s, i){
    var o = document.createElement("div");
    o.className = "opt " + (s.k === "tr" ? "" : s.k);
    o.style.background = s.k === "tr" ? "transparent" : BLADE_COLORS[i];
    if(s.k === "tr"){
      o.style.border = "none"; o.style.boxShadow = "none";
      var t = document.createElement("div");
      t.className = "tr";
      t.style.borderBottomColor = BLADE_COLORS[i];
      o.appendChild(t);
    }
    bindTap(o, function(){
      ac();
      if(s.k === want.k){
        sparkle(); cheer(); confetti(); award();
        promptEl.textContent = "Yes! A " + s.n + "! 🎉";
        say("Yes! A " + s.n + "!");
        controls.innerHTML = "";
        btn("Next →", "next", function(){ gameShapes(); });
      } else {
        nudge();
        promptEl.textContent = "That's a " + s.n + ". We need a " + want.n + ".";
        say("That is a " + s.n + ". We need a " + want.n + ".", function(){ say("Try again!", null, "tryagain"); });
      }
    });
    row.appendChild(o);
  });
  stage.appendChild(row);
}

/* ============ GAME 7: What Comes Next? ============ */
function gamePattern(){
  clearStage();
  var a = BLADE_COLORS[rnd(0, 5)], b;
  do{ b = BLADE_COLORS[rnd(0, 5)]; } while(b === a);
  var seq = [a, b, a, b, a, b];
  var len = 5;
  var nextColor = seq[len];

  promptEl.textContent = "What comes next?";
  say("Look at the pattern. What comes next?", null, "whatnext");

  var row = document.createElement("div");
  row.className = "row";
  for(var i=0;i<len;i++){
    var c = document.createElement("div");
    c.className = "pchip";
    c.style.background = seq[i];
    row.appendChild(c);
  }
  var q = document.createElement("div");
  q.className = "pchip q";
  q.textContent = "?";
  row.appendChild(q);
  stage.appendChild(row);

  var opts = document.createElement("div");
  opts.className = "row";
  var choices = [a, b];
  var other;
  do{ other = BLADE_COLORS[rnd(0, 5)]; } while(other === a || other === b);
  choices.push(other);
  choices.sort(function(){ return Math.random() - 0.5; });
  choices.forEach(function(col){
    var o = document.createElement("div");
    o.className = "opt";
    o.style.background = col;
    o.style.borderRadius = "14px";
    bindTap(o, function(){
      ac();
      if(col === nextColor){
        q.textContent = "";
        q.style.background = col;
        sparkle(); cheer(); confetti(); award();
        promptEl.textContent = "That's the pattern! 🎉";
        say("Yes! That is the pattern!");
        controls.innerHTML = "";
        btn("Next →", "next", function(){ gamePattern(); });
      } else {
        nudge();
        say("Look at the pattern again!", function(){ say("Try again!", null, "tryagain"); });
        promptEl.textContent = "Look again — what keeps repeating?";
      }
    });
    opts.appendChild(o);
  });
  stage.appendChild(opts);
}

/* ============ GAME 8: Which Has More? ============ */
function gameMore(){
  clearStage();
  var x = rnd(1, 5), y;
  do{ y = rnd(1, 5); } while(y === x);
  promptEl.textContent = "Which fan has MORE blades?";
  say("Which fan has more blades?", null, "whichmore");

  var row = document.createElement("div");
  row.className = "row";
  var f1 = makeFan(x, x, {hub:""});
  var f2 = makeFan(y, y, {hub:""});
  [[f1, x], [f2, y]].forEach(function(pair){
    var fan = pair[0], n = pair[1];
    fan.style.cursor = "pointer";
    bindTap(fan, function(){
      ac();
      var win = n === Math.max(x, y);
      if(win){
        f1.hub.textContent = String(x);
        f2.hub.textContent = String(y);
        fan.classList.add("spin");
        sparkle(); cheer(); confetti(); award();
        popNum(n);
        promptEl.textContent = n + " is more than " + Math.min(x, y) + "! 🎉";
        say(word(n) + " is more than " + word(Math.min(x, y)) + "!");
        controls.innerHTML = "";
        btn("Next →", "next", function(){ gameMore(); });
      } else {
        nudge();
        say("That fan has " + word(n) + ". Count them again!");
        promptEl.textContent = "That one has " + n + ". Count again!";
      }
    });
    row.appendChild(fan);
  });
  stage.appendChild(row);
}

var CLIPDEFS = [
  {k:"n1",  l:"One",   t:"One!"},
  {k:"n2",  l:"Two",   t:"Two!"},
  {k:"n3",  l:"Three", t:"Three!"},
  {k:"n4",  l:"Four",  t:"Four!"},
  {k:"n5",  l:"Five",  t:"Five!"},
  {k:"n0",  l:"Zero",  t:"Zero!"},
  {k:"n6",  l:"Six",   t:"Six!"},
  {k:"n7",  l:"Seven", t:"Seven!"},
  {k:"n8",  l:"Eight", t:"Eight!"},
  {k:"n9",  l:"Nine",  t:"Nine!"},
  {k:"n10", l:"Ten",   t:"Ten!"},
  {k:"ask_count",  l:"How many candles?",   t:"How many candles? Tap each one."},
  {k:"blow",       l:"Now blow them out!",  t:"Now blow them out!"},
  {k:"allout",     l:"All out!",            t:"All out! Happy birthday!"},
  {k:"yay",        l:"Yay, you did it!",    t:"Yay! You did it!"},

  {k:"trick_back", l:"They came back!",     t:"Uh oh! They came back! How many now?"},
  {k:"build",      l:"Build the fan!",      t:"Build the fan!"},
  {k:"catch",      l:"Catch the leaves!",   t:"Catch the leaves!"},

  {k:"whichmore",  l:"Which has more?",     t:"Which fan has more blades?"}
];

var recStream = null, recorder = null, recKey = null;

function buildVoiceSel(){
  loadVoices();
  var sel = $("#voicesel");
  sel.innerHTML = "";
  if(!VOICES.length){
    var o = document.createElement("option");
    o.textContent = "No voices found on this device";
    sel.appendChild(o);
    return;
  }
  VOICES.map(function(v){ return {v:v, s:scoreVoice(v)}; })
        .sort(function(a,b){ return b.s - a.s; })
        .forEach(function(r){
    var o = document.createElement("option");
    o.value = r.v.name;
    o.textContent = r.v.name + (/premium|enhanced|siri/i.test(r.v.name) ? "  ★ high quality" : "");
    if(VOICE && VOICE.name === r.v.name) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = function(){ setVoice(sel.value); say("Hi! I am your counting voice."); };
}

function buildClipList(){
  var list = $("#cliplist");
  list.innerHTML = "";
  CLIPDEFS.forEach(function(c){
    var row = document.createElement("div");
    row.className = "cliprow" + (CLIPS[c.k] ? " has" : "");
    row.dataset.k = c.k;

    var dot = document.createElement("div");
    dot.className = "dot";

    var lbl = document.createElement("div");
    lbl.className = "lbl";
    lbl.innerHTML = c.l + "<small>" + c.t + "</small>";

    var rec = document.createElement("button");
    rec.className = "minibtn rec";
    rec.textContent = "Rec";

    var play = document.createElement("button");
    play.className = "minibtn";
    play.textContent = "▶";

    bindTap(rec, function(){
      ac();
      if(recorder && recKey === c.k){ stopRec(); return; }
      if(recorder) stopRec();
      startRec(c.k, row, rec);
    });
    bindTap(play, function(){
      ac();
      if(CLIPS[c.k]) playClip(c.k);
      else say(c.t);
    });

    row.appendChild(dot); row.appendChild(lbl); row.appendChild(play); row.appendChild(rec);
    list.appendChild(row);
  });
}

function startRec(key, row, btn){
  if(!navigator.mediaDevices || !window.MediaRecorder){
    row.querySelector(".lbl small").textContent = "Recording is not supported in this browser.";
    return;
  }
  var go = function(stream){
    recStream = stream;
    var opts = {};
    try{
      if(MediaRecorder.isTypeSupported("audio/mp4")) opts.mimeType = "audio/mp4";
      else if(MediaRecorder.isTypeSupported("audio/webm")) opts.mimeType = "audio/webm";
    }catch(e){}
    var chunks = [];
    recorder = new MediaRecorder(stream, opts);
    recKey = key;
    recorder.ondataavailable = function(e){ if(e.data && e.data.size) chunks.push(e.data); };
    recorder.onstop = function(){
      var blob = new Blob(chunks, {type: recorder.mimeType || "audio/mp4"});
      recorder = null; recKey = null;
      row.classList.remove("rec");
      btn.textContent = "Rec"; btn.classList.remove("stop"); btn.classList.add("rec");
      if(!blob.size) return;
      dbPut(key, blob).then(function(){
        if(CLIPS[key]) try{ URL.revokeObjectURL(CLIPS[key]); }catch(e){}
        CLIPS[key] = URL.createObjectURL(blob);
        row.classList.add("has");
        playClip(key);
      }).catch(function(){});
    };
    recorder.start();
    row.classList.add("rec");
    btn.textContent = "Stop"; btn.classList.remove("rec"); btn.classList.add("stop");
    setTimeout(function(){ if(recorder && recKey === key) stopRec(); }, 6000); // safety cap
  };
  if(recStream && recStream.active) return go(recStream);
  navigator.mediaDevices.getUserMedia({audio:true}).then(go).catch(function(){
    row.querySelector(".lbl small").textContent = "Microphone permission was declined.";
  });
}
function stopRec(){
  try{ if(recorder && recorder.state !== "inactive") recorder.stop(); }catch(e){ recorder = null; recKey = null; }
}

function openStudio(){
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  buildVoiceSel();
  buildClipList();
  $("#studio").classList.add("show");
}
function closeStudio(){
  stopRec();
  if(recStream){ recStream.getTracks().forEach(function(t){ t.stop(); }); recStream = null; }
  $("#studio").classList.remove("show");
}
bindTap($("#studioclose"), closeStudio);
bindTap($("#voicetest"), function(){ ac(); say("One, two, three! Blow out the candles!"); });
bindTap($("#clipwipe"), function(){
  ac();
  var b = $("#clipwipe");
  if(b.dataset.armed !== "1"){
    b.dataset.armed = "1";
    b.textContent = "Tap again to erase";
    setTimeout(function(){ b.dataset.armed = "0"; b.textContent = "Erase all recordings"; }, 3500);
    return;
  }
  b.dataset.armed = "0";
  b.textContent = "Erase all recordings";
  CLIPDEFS.forEach(function(c){
    if(CLIPS[c.k]){ try{ URL.revokeObjectURL(CLIPS[c.k]); }catch(e){} delete CLIPS[c.k]; dbDel(c.k).catch(function(){}); }
  });
  buildClipList();
});

// simple gate so a toddler mashing the screen cannot wander into the studio
function openGate(){
  var target = rnd(3, 9);
  $("#gateq").textContent = "Tap the number " + target + ".";
  var grid = $("#gategrid");
  grid.innerHTML = "";
  var nums = [target];
  while(nums.length < 4){
    var n = rnd(2, 9);
    if(nums.indexOf(n) < 0) nums.push(n);
  }
  nums.sort(function(){ return Math.random() - 0.5; });
  nums.forEach(function(n){
    var b = document.createElement("button");
    b.className = "gnum";
    b.textContent = String(n);
    bindTap(b, function(){
      if(n === target){ $("#gate").classList.remove("show"); openStudio(); }
      else { nudge(); openGate(); }
    });
    grid.appendChild(b);
  });
  $("#gate").classList.add("show");
}
bindTap($("#studiobtn"), function(){ ac(); openGate(); });
bindTap($("#gate"), function(e){ if(e.target && e.target.id === "gate") $("#gate").classList.remove("show"); });
